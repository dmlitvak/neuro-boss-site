name: Deploy to sweb.ru via classic FTP (test)

# Экспериментальный, не боевой деплой — сравниваем классический FTP с уже
# работающим SFTP-вариантом (deploy-sweb.yml). Отдельная тестовая подпапка
# pinarik.ru/ftp-neuro-boss, отдельный FTP-аккаунт на sweb.ru (доступ только
# в эту папку, не в весь хостинг-аккаунт — в этом смысле FTP-аккаунт даже
# безопаснее, чем логин/пароль от всего аккаунта, который используется для
# SFTP-варианта).
#
# ВАЖНО: обычный FTP передаёт логин/пароль и файлы НЕ зашифрованными.
# Это осознанный компромисс ради изучения технологии — не боевой канал.
#
# Запускается только вручную (workflow_dispatch), не по каждому push —
# это инструмент для сравнения, не постоянный деплой-таргет.
#
# Секреты заведены (2026-07-06): FTP_HOST=77.222.40.197,
# FTP_USER=pminforu_claude, FTP_PASSWORD, FTP_REMOTE_PATH=/ (аккаунт
# chrooted в свою папку — подтверждено вручную через `curl --user ...
# ftp://77.222.40.197/`, видно только пустую "." / "..", ничего лишнего).

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
      - name: Build (base path для тестовой подпапки ftp-neuro-boss)
        run: npm run build
        env:
          DEPLOY_TARGET: ftp-test
      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp
      - name: Sanity-check remote path
        run: |
          if [ -z "$FTP_REMOTE_PATH" ]; then
            echo "::error::FTP_REMOTE_PATH пуст — деплой отменён, проверь секрет"
            exit 1
          fi
        env:
          FTP_REMOTE_PATH: ${{ secrets.FTP_REMOTE_PATH }}
      - name: Deploy via classic FTP (lftp mirror)
        run: |
          cat > /tmp/lftp-ftp-deploy.txt <<SCRIPT
          open -u "$FTP_USER,$FTP_PASSWORD" -p 21 ftp://$FTP_HOST
          set ftp:passive-mode true
          set ssl:verify-certificate no
          mirror -R --delete --verbose dist $FTP_REMOTE_PATH
          bye
          SCRIPT
          lftp -f /tmp/lftp-ftp-deploy.txt
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_REMOTE_PATH: ${{ secrets.FTP_REMOTE_PATH }}
