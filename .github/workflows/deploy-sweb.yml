name: Deploy to sweb.ru (pinarik.ru/neuro-boss)

# SpaceWeb (sweb.ru) не поддерживает SSH-ключи на обычном виртуальном
# (shared) хостинге — только пароль от аккаунта (проверено эмпирически:
# ключ в ~/.ssh/authorized_keys сервер не принимает, "publickey" отклоняется).
# Поэтому здесь используется пароль — компромисс, на который осознанно
# согласился владелец проекта.
#
# Второй эмпирический факт: сервер обрывает соединение на любой
# неинтерактивной SSH-команде (exec-канал — тот же механизм, которым
# пользуются rsync и scp), хотя интерактивный логин работает нормально.
# Из-за этого rsync-over-ssh не работает ("bash: line 1: /: Is a directory",
# rsync error code 126). SFTP (отдельный subsystem-канал SSH, не exec) при
# этом доступен — поэтому деплой сделан через lftp по sftp://, а не rsync.
#
# TODO перед первым запуском (см. _private/HANDOFF.md): завести в
# Settings → Secrets and variables → Actions:
#   SWEB_HOST=77.222.40.197
#   SWEB_USER=pminforu
#   SWEB_PASSWORD=<пароль аккаунта>
#   SWEB_REMOTE_PATH=/home/p/pminforu/pinarik_ru/public_html/neuro-boss

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
      - name: Build (base path для подпапки pinarik.ru/neuro-boss)
        run: npm run build
        env:
          DEPLOY_TARGET: sweb
      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp
      - name: Sanity-check remote path
        # Защита от пустого/битого SWEB_REMOTE_PATH: mirror --delete ниже не
        # должен получить пустой/корневой путь назначения.
        run: |
          if [ -z "$SWEB_REMOTE_PATH" ] || [ "$SWEB_REMOTE_PATH" = "/" ]; then
            echo "::error::SWEB_REMOTE_PATH пуст или равен '/' — деплой отменён, проверь секрет"
            exit 1
          fi
        env:
          SWEB_REMOTE_PATH: ${{ secrets.SWEB_REMOTE_PATH }}
      - name: Deploy via SFTP (lftp mirror)
        # Скрипт-файл вместо inline -e "...": вложенные экранированные кавычки
        # в -e ломали парсинг lftp (висящая закрывающая кавычка после "bye"
        # воспринималась как отдельная неизвестная команда).
        run: |
          cat > /tmp/lftp-deploy.txt <<SCRIPT
          set sftp:auto-confirm yes
          mirror -R --delete --verbose dist $SWEB_REMOTE_PATH
          bye
          SCRIPT
          lftp -u "$SWEB_USER,$SWEB_PASSWORD" -p 22 "sftp://$SWEB_HOST" -f /tmp/lftp-deploy.txt
        env:
          SWEB_HOST: ${{ secrets.SWEB_HOST }}
          SWEB_USER: ${{ secrets.SWEB_USER }}
          SWEB_PASSWORD: ${{ secrets.SWEB_PASSWORD }}
          SWEB_REMOTE_PATH: ${{ secrets.SWEB_REMOTE_PATH }}
